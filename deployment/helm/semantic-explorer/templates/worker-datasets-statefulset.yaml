{{- if .Values.workerDatasets.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "semantic-explorer.fullname" . }}-worker-datasets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "semantic-explorer.workerDatasets.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "semantic-explorer.fullname" . }}-worker-datasets
  {{- if not .Values.workerDatasets.autoscaling.enabled }}
  replicas: {{ .Values.workerDatasets.replicaCount }}
  {{- end }}
  podManagementPolicy: {{ .Values.workerDatasets.statefulset.podManagementPolicy }}
  updateStrategy:
    {{- toYaml .Values.workerDatasets.statefulset.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "semantic-explorer.workerDatasets.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.workerDatasets.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "semantic-explorer.workerDatasets.selectorLabels" . | nindent 8 }}
        {{- with .Values.workerDatasets.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "semantic-explorer.workerDatasets.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.global.securityContext | nindent 8 }}
      {{- with .Values.workerDatasets.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
      - name: worker-datasets
        image: {{ include "semantic-explorer.workerDatasets.image" . }}
        imagePullPolicy: {{ .Values.workerDatasets.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.global.podSecurityContext | nindent 10 }}
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep {{ .Values.workerDatasets.preStopSleepSeconds | default 5 }}"]
        env:
        {{- range $key, $value := .Values.workerDatasets.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        - name: NATS_URL
          value: {{ include "semantic-explorer.nats.url" . }}
        - name: QDRANT_URL
          value: {{ include "semantic-explorer.qdrant.url" . }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              {{- if .Values.minio.enabled }}
              name: {{ .Release.Name }}-minio
              key: rootUser
              {{- else }}
              name: {{ include "semantic-explorer.fullname" . }}-secrets
              key: aws-access-key-id
              {{- end }}
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              {{- if .Values.minio.enabled }}
              name: {{ .Release.Name }}-minio
              key: rootPassword
              {{- else }}
              name: {{ include "semantic-explorer.fullname" . }}-secrets
              key: aws-secret-access-key
              {{- end }}
        - name: AWS_REGION
          value: {{ include "semantic-explorer.storage.s3.region" . }}
        - name: AWS_ENDPOINT_URL
          value: {{ include "semantic-explorer.storage.s3.endpoint" . }}
        - name: S3_FORCE_PATH_STYLE
          value: {{ include "semantic-explorer.storage.s3.forcePathStyle" . | quote }}
        - name: S3_BUCKET_NAME
          value: {{ .Values.storage.s3.bucketName }}
        - name: S3_MAX_DOWNLOAD_SIZE_BYTES
          value: {{ printf "%.0f" .Values.storage.s3.maxDownloadSizeBytes | quote }}
        - name: S3_MAX_UPLOAD_SIZE_BYTES
          value: {{ printf "%.0f" .Values.storage.s3.maxUploadSizeBytes | quote }}
        - name: ENCRYPTION_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "semantic-explorer.fullname" . }}-secrets
              key: encryption-master-key
        {{- if .Values.embeddingInferenceApi.enabled }}
        - name: EMBEDDING_INFERENCE_API_URL
          value: {{ include "semantic-explorer.embeddingInferenceApi.url" . }}
        - name: EMBEDDING_INFERENCE_API_TIMEOUT_SECS
          value: {{ .Values.workerDatasets.env.EMBEDDING_INFERENCE_API_TIMEOUT_SECS | default "120" | quote }}
        {{- end }}
        {{- if .Values.observability.otelCollector.enabled }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ include "semantic-explorer.otel.endpoint" . }}
        {{- if not (hasKey .Values.workerDatasets.env "SERVICE_NAME") }}
        - name: SERVICE_NAME
          value: "worker-datasets"
        {{- end }}
        {{- end }}
        {{- with .Values.workerDatasets.envFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.workerDatasets.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.workerDatasets.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.workerDatasets.resources | nindent 10 }}
        {{- with .Values.workerDatasets.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.workerDatasets.volumes }}
      volumes:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.workerDatasets.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workerDatasets.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.workerDatasets.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
{{- end }}
